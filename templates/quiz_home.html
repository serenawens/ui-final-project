{% extends "quiz_layout.html" %}

{% block content %}
<section class="text-center py-5">
  <h1 class="display-5 fw-bold mb-3">Let's Test What You Learned!</h1>
  {% if selected_material %}
  <p class="lead text-secondary mb-2">You completed {{ selected_material.name }}. Start your quiz when ready.</p>
  {% endif %}
  <p class="lead text-secondary mb-4">Ready to test your knowledge?</p>

  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="d-grid">
        <a id="startQuizBtn" class="btn btn-success btn-lg" href="/quiz/question/1">Start Quiz</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
