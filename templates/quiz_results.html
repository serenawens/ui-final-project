{% extends "quiz_layout.html" %}

{% block content %}
<section class="quiz-results text-center py-4" data-page-type="quiz-results">
  <h2 class="fw-bold mb-3">Quiz Complete!</h2>
  <p class="text-secondary mb-4">Your responses were stored with your UNI.</p>

  <div class="score-card mx-auto mb-4">
    <p class="mb-1 text-muted">Your Score</p>
    <h3 id="scoreValue" class="display-5 fw-bold mb-0">0 / 0</h3>
  </div>

  <div class="d-flex justify-content-center gap-2 flex-wrap">
    <a href="{{ url_for('home_page') }}" class="btn btn-outline-primary btn-lg">Back to Home</a>
    <a href="{{ url_for('quiz_page', question_id=1) }}" id="restartQuizBtn" class="btn btn-primary btn-lg">Restart Quiz</a>
  </div>
</section>
{% endblock %}
